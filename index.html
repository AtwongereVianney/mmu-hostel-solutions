<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!--
    NOTE: frame-ancestors & X-Frame-Options must be set via HTTP headers (production).
    CSP connect-src set to 'self' for dev tools (tighten to 'none' in production).
  -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com;
             style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com https://fonts.gstatic.com;
             font-src 'self' https://fonts.gstatic.com;
             img-src 'self' data: https:;
             frame-src https://www.openstreetmap.org;
             connect-src 'self';
             object-src 'none';
             base-uri 'self';
             form-action 'self';"/>

  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta http-equiv="Referrer-Policy" content="no-referrer"/>
  <meta name="robots" content="noindex, nofollow"/>

  <title>MMU Hostel Booking System</title>
  <meta name="description" content="Mountains of the Moon University – Student Hostel Booking Portal"/>

  <!-- Tailwind CSS (production: swap for purged build) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <!-- App Stylesheet -->
  <link rel="stylesheet" href="./css/styles.css"/>
</head>
<body>

  <!-- ═══ SECURITY: Frame-busting — prevents clickjacking via iframes ═══ -->
  <script>
    (function () {
      'use strict';
      if (window.self !== window.top) {
        window.top.location = window.self.location;
      }
    })();
  </script>

  <!-- App mount point -->
  <div id="root"></div>

  <!-- ═══ App entry – ES module so scripts are deferred & scoped ══════ -->
  <script type="module" src="./js/app.js"></script>
</body>
</html>
