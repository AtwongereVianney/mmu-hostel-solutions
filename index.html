<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- ═══ SECURITY: Content Security Policy ═══════════════════════════════
       Blocks XSS, data-URI injection, plugin embeds, framing, and
       form-action hijacking. img-src allows data: for base64 photo uploads.
       NOTE: Full CSP is set via HTTP headers in netlify.toml/vercel.json
  ══════════════════════════════════════════════════════════════════════════ -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta http-equiv="Referrer-Policy" content="no-referrer"/>
  <meta name="robots" content="noindex, nofollow"/>

  <title>MMU Hostel Booking System</title>
  <meta name="description" content="Mountains of the Moon University – Student Hostel Booking Portal"/>
  <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>"/>

  <!-- Tailwind CSS (local purged build – generated by Tailwind CLI v4) -->
  <link rel="stylesheet" href="css/tailwind.output.css"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <!-- App Stylesheet -->
  <link rel="stylesheet" href="css/styles.css"/>

</head>
<body>

  <!-- ═══ SECURITY: Frame-busting — prevents clickjacking via iframes ═══ -->
  <script>
    (function () {
      'use strict';
      if (window.self !== window.top) {
        window.top.location = window.self.location;
      }
    })();
  </script>

  <!-- App mount point -->
  <div id="root"></div>

  <!-- ═══ App entry – ES module so scripts are deferred & scoped ══════ -->
  <script type="module" src="js/app.js?v=20260418"></script>
</body>
</html>
