# ═══════════════════════════════════════════════════════════════════════════
# netlify.toml – Netlify Deployment Configuration
# MMU Hostel Booking System
# ═══════════════════════════════════════════════════════════════════════════

[build]
  # No build step – pure static site
  publish = "."

# ── Security Headers (applied to every response) ────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "no-referrer"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-XSS-Protection          = "1; mode=block"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://www.openstreetmap.org; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"

# ── Cache static assets aggressively ──────────────────────────────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── SPA redirect (all routes → index.html) ────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
