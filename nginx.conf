# ═══════════════════════════════════════════════════════════════════════════
# nginx.conf  –  Nginx Server Block for MMU Hostel Booking System
# For VPS / dedicated server (Ubuntu + Nginx)
#
# Place this file at:  /etc/nginx/sites-available/mmu-hostel
# Then: sudo ln -s /etc/nginx/sites-available/mmu-hostel /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL Certificate (Let's Encrypt via Certbot) ──────────────────────
    # Run: sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Document Root ─────────────────────────────────────────────────────
    root  /var/www/mmu-hostel;
    index index.html;

    # ── Security Headers ──────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                           always;
    add_header X-Content-Type-Options    "nosniff"                        always;
    add_header Referrer-Policy           "no-referrer"                    always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-XSS-Protection          "1; mode=block"                  always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://www.openstreetmap.org; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

    # ── SPA Routing (all unknown paths → index.html) ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────────────────────────
    location ~* \.(js|css|woff2|png|jpg|jpeg|webp|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── No cache for HTML ─────────────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── Block hidden files (.git, .env, etc.) ────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Gzip compression ─────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types      text/html text/css application/javascript application/json font/woff2 image/svg+xml;
}
